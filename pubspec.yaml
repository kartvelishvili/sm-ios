name: smartluxy
description: "Smart Luxy - საცხოვრებელი კომპლექსების მართვის აპლიკაცია"
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # State Management
  provider: ^6.1.2

  # Networking
  dio: ^5.7.0
  
  # Local Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4

  # Navigation
  go_router: ^14.8.1

  # WebView (for BOG payments)
  webview_flutter: ^4.10.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1
  device_info_plus: ^11.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1A1A1A"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/icon/

  fonts:
    - family: BPG Glaho WEB
      fonts:
        - asset: assets/fonts/BPG-Glaho-WEB.ttf
    - family: BPG WEB 002 Caps
      fonts:
        - asset: assets/fonts/BPG-WEB-002-Caps.ttf
